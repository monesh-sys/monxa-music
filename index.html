<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monesh Music</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#121212;
    color:white;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
}

header h1{
    color:#1DB954;
}

.container{
    padding:20px;
    margin-bottom:140px;
}

.playlist{
    background:#1e1e1e;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.playlist-title{
    padding:15px;
    cursor:pointer;
    font-size:20px;
    font-weight:bold;
    color:#1DB954;
}

.playlist-title:hover{
    background:#2a2a2a;
}

.songs-list{
    display:none;
}

.song{
    padding:12px 20px;
    border-top:1px solid #333;
    cursor:pointer;
}

.song:hover{
    background:#333;
}

.player{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    background:#000;
    padding:15px;
}

button{
    padding:8px 15px;
    margin-right:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

audio{
    width:100%;
}

#currentSong{
    color:#1DB954;
    margin-bottom:10px;
}
</style>
</head>
<body>

<header>
    <h1>🎵 Monesh Music</h1>
</header>

<div class="container" id="container"></div>

<div class="player">

    <h3 id="currentSong">No Song Selected</h3>

    <div>
        <button onclick="previousSong()">⏮ Prev</button>
        <button onclick="nextSong()">⏭ Next</button>
    </div>

    <audio id="audioPlayer" controls></audio>

</div>

<script>

let songs = [];
let currentIndex = 0;

/*
👉 MANUAL DATA (NO FLASK TEMPLATE)
👉 You can replace this with API later
*/
let playlists = {
    "Chill": [
        {file:"Chill/song1.mp3", title:"Relax Vibes"},
        {file:"Chill/song2.mp3", title:"Night Mood"}
    ],
    "Rock": [
        {file:"Rock/rock1.mp3", title:"Power Rock"}
    ]
};

// ----------------------
// BUILD UI
// ----------------------
function loadUI(){

    let container = document.getElementById("container");

    let html = "";

    for(let playlist in playlists){

        html += `
        <div class="playlist">

            <div class="playlist-title" onclick="toggle(this)">
                📂 ${playlist}
            </div>

            <div class="songs-list">
        `;

        playlists[playlist].forEach(song => {

            songs.push(song);

            html += `
                <div class="song" onclick="playSong('${song.file}','${song.title}')">
                    🎶 ${song.title}
                </div>
            `;
        });

        html += `
            </div>
        </div>`;
    }

    container.innerHTML = html;
}

// ----------------------
// TOGGLE PLAYLIST
// ----------------------
function toggle(el){
    let list = el.nextElementSibling;
    list.style.display = (list.style.display === "block") ? "none" : "block";
}

// ----------------------
// PLAY SONG
// ----------------------
function playSong(file, title){

    const player = document.getElementById("audioPlayer");

    currentIndex = songs.findIndex(s => s.file === file);

    player.src = "/music/" + file;
    player.load();
    player.play();

    document.getElementById("currentSong").innerText = title;
}

// ----------------------
// NEXT SONG
// ----------------------
function nextSong(){

    if(currentIndex < songs.length - 1){
        currentIndex++;
        playSong(songs[currentIndex].file, songs[currentIndex].title);
    }
}

// ----------------------
// PREVIOUS SONG
// ----------------------
function previousSong(){

    if(currentIndex > 0){
        currentIndex--;
        playSong(songs[currentIndex].file, songs[currentIndex].title);
    }
}

// AUTO NEXT
document.getElementById("audioPlayer").addEventListener("ended", nextSong);

// INIT
loadUI();

</script>

</body>
</html>
