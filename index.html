<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monxa Music</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#121212;
    color:white;
}

header{
    background:black;
    padding:15px;
    text-align:center;
    color:#1DB954;
    font-size:24px;
}

.container{
    padding:20px;
}

.playlist{
    background:#1e1e1e;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.playlist h2{
    margin:0;
    padding:15px;
    background:#181818;
    color:#1DB954;
    cursor:pointer;
}

.song{
    padding:12px;
    border-top:1px solid #333;
    cursor:pointer;
}

.song:hover{
    background:#2a2a2a;
}

.songs{
    display:none;
}

.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    padding:10px;
}

audio{
    width:100%;
}

#title{
    color:#1DB954;
    margin-bottom:5px;
}
</style>
</head>

<body>

<header>🎵 Monxa Music</header>

<div class="container" id="app"></div>

<div class="player">
    <div id="title">No Song Selected</div>
    <audio id="audio" controls></audio>
</div>

<script>
// 🎵 YOUR PLAYLIST DATA (EDIT HERE)
const playlists = {
    "Tamil Hits": [
        {file:"music/Tamil Hits/Aathi Raasathi.mp3", title:"Aathi Raasathi"},
        {file:"music/Tamil Hits/God Mode.mp3", title:"God Mode"}
    ],
    "Workout": [
        {file:"music/Workout/Verappa.mp3", title:"Verappa"},
        {file:"music/Workout/Karuppa Kooda Va.mp3", title:"Karuppa Kooda Va"}
    ]
};

// 🔥 render UI
const app = document.getElementById("app");

for(let p in playlists){

    let html = `<div class="playlist">
        <h2 onclick="toggle(this)">📂 ${p}</h2>
        <div class="songs">`;

    playlists[p].forEach(song=>{
        html += `
        <div class="song" onclick="playSong('${song.file}','${song.title}')">
            🎶 ${song.title}
        </div>`;
    });

    html += `</div></div>`;

    app.innerHTML += html;
}

// 📂 open/close playlist
function toggle(el){
    let songs = el.nextElementSibling;
    songs.style.display = songs.style.display === "block" ? "none" : "block";
}

// ▶ play song
function playSong(file,title){
    document.getElementById("audio").src = file;
    document.getElementById("audio").play();
    document.getElementById("title").innerText = title;
}
</script>

</body>
</html>
