<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monxa Music</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#121212;
    color:white;
}

header{
    background:black;
    padding:15px;
    text-align:center;
    color:#1DB954;
    font-size:24px;
}

.container{
    padding:20px;
}

.playlist{
    background:#1e1e1e;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.playlist h2{
    margin:0;
    padding:15px;
    background:#181818;
    color:#1DB954;
    cursor:pointer;
}

.song{
    padding:12px;
    border-top:1px solid #333;
    cursor:pointer;
}

.song:hover{
    background:#2a2a2a;
}

.songs{
    display:none;
}

.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    padding:10px;
}

audio{
    width:100%;
}

#title{
    color:#1DB954;
    margin-bottom:5px;
}
</style>
</head>

<body>

<header>🎵 Monxa Music</header>

<div class="container" id="app"></div>

<div class="player">
    <div id="title">No Song Selected</div>
    <audio id="audio" controls></audio>
</div>

<script>

const playlists = {
    "Tamil Hits": [
        {file:"music/Tamil Hits/Aathi Raasathi.mp3", title:"Aathi Raasathi"},
        {file:"music/Tamil Hits/God Mode.mp3", title:"God Mode"},
        {file:"music/Tamil Hits/NewSong.mp3", title:"NewSong"}
    ],
    "Workout": [
        {file:"music/Workout/Verappa.mp3", title:"Verappa"},
        {file:"music/Workout/Karuppa Kooda Va.mp3", title:"Karuppa Kooda Va"}
    ]
};

const app = document.getElementById("app");
const audio = document.getElementById("audio");
const titleBox = document.getElementById("title");

let songList = [];
let currentIndex = -1;

/* ================= RENDER ================= */

for(let p in playlists){

    let html = `<div class="playlist">
        <h2 onclick="toggle(this)">📂 ${p}</h2>
        <div class="songs">`;

    playlists[p].forEach(song=>{
        songList.push(song);

        html += `
        <div class="song" onclick="playSong('${song.file}','${song.title}')">
            🎶 ${song.title}
        </div>`;
    });

    html += `</div></div>`;
    app.innerHTML += html;
}

/* ================= TOGGLE ================= */

function toggle(el){
    let box = el.nextElementSibling;
    box.style.display = (box.style.display === "block") ? "none" : "block";
}

/* ================= PLAY SONG ================= */

function playSong(file, title){

    currentIndex = songList.findIndex(s => s.file === file);

    audio.src = file;
    audio.play();

    titleBox.innerText = title;
}

/* ================= AUTO NEXT ================= */

audio.addEventListener("ended", function(){

    currentIndex++;

    if(currentIndex < songList.length){

        audio.src = songList[currentIndex].file;
        audio.play();

        titleBox.innerText = songList[currentIndex].title;
    }
});

</script>

</body>
</html>
