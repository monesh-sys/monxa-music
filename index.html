<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Monxa Music</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#121212;
    color:white;
}

header{
    background:black;
    padding:15px;
    text-align:center;
    color:#1DB954;
    font-size:24px;
}

.container{
    padding:20px;
}

.playlist{
    background:#1e1e1e;
    margin-bottom:15px;
    border-radius:10px;
    overflow:hidden;
}

.playlist h2{
    margin:0;
    padding:15px;
    background:#181818;
    color:#1DB954;
    cursor:pointer;
}

.song{
    padding:12px;
    border-top:1px solid #333;
    cursor:pointer;
}

.song:hover{
    background:#2a2a2a;
}

.songs{
    display:none;
}

.player{
    position:fixed;
    bottom:0;
    width:100%;
    background:black;
    padding:10px;
}

audio{
    width:100%;
}

#title{
    color:#1DB954;
    margin-bottom:5px;
}
</style>
</head>

<body>

<header>🎵 Monxa Music</header>

<div class="container" id="app"></div>

<div class="player">
    <div id="title">No Song Selected</div>
    <audio id="audio" controls></audio>
</div>

<script>

{file:"music/Tamil Hits/NewSong.mp3", title:"NewSong"}

const app = document.getElementById("app");
const audio = document.getElementById("audio");
const titleBox = document.getElementById("title");

let songList = [];   // ALL songs in order
let currentIndex = -1;

// render UI
for(let p in playlists){

    let html = `<div class="playlist">
        <h2 onclick="toggle(this)">📂 ${p}</h2>
        <div class="songs">`;

    playlists[p].forEach(song=>{
        songList.push(song); // store for auto next

        html += `
        <div class="song" onclick="playSong('${song.file}','${song.title}')">
            🎶 ${song.title}
        </div>`;
    });

    html += `</div></div>`;
    app.innerHTML += html;
}

// toggle playlist
function toggle(el){
    let songs = el.nextElementSibling;
    songs.style.display = songs.style.display === "block" ? "none" : "block";
}

// play song
function playSong(file,title){

    currentIndex = songList.findIndex(s => s.file === file);

    audio.src = file;
    audio.play();

    titleBox.innerText = title;
}

// 🔥 AUTO NEXT SONG
audio.addEventListener("ended", function(){

    if(currentIndex < songList.length - 1){
        currentIndex++;

        let next = songList[currentIndex];

        audio.src = next.file;
        audio.play();

        titleBox.innerText = next.title;
    }

});

</script>

</body>
</html>
